# Workflow: PlantUML Diagram Generation
# PlantUML 图表生成工作流，统辖所有 diagram skill

workflow:
  name: "diagram-generate"
  version: "0.1.0"
  description: "PlantUML 图表生成工作流 — 路由到合适的 diagram skill"

  # 触发条件
  triggers:
    - "需要生成 PlantUML 架构图时"
    - "需要生成 PlantUML 时序图时"
    - "需要生成其他 PlantUML 图表时"

  # 引用的 skill
  referenced_skills:
    - name: "feipi-plantuml-generate-diagram"
      path: "skills/diagram/feipi-plantuml-generate-diagram/SKILL.md"
      role: "主入口（推荐使用）"
    - name: "feipi-plantuml-generate-architecture-diagram"
      path: "skills/diagram/feipi-plantuml-generate-architecture-diagram/SKILL.md"
      role: "架构图兼容入口"
    - name: "feipi-plantuml-generate-sequence-diagram"
      path: "skills/diagram/feipi-plantuml-generate-sequence-diagram/SKILL.md"
      role: "时序图兼容入口"

  # 路由逻辑
  routing:
    default: "feipi-plantuml-generate-diagram"
    compatibility:
      - condition: "用户明确要求架构图入口"
        target: "feipi-plantuml-generate-architecture-diagram"
      - condition: "用户明确要求时序图入口"
        target: "feipi-plantuml-generate-sequence-diagram"

  # 校验步骤
  steps:
    - name: "validate-plantuml-syntax"
      description: "校验生成的 PlantUML 语法"
      required: true

    - name: "check-template-usage"
      description: "检查是否使用了正确的模板"
      required: true

  # 输出
  outputs:
    - type: "diagram"
      description: "生成的 PlantUML 文件路径"
    - type: "validation"
      description: "校验结果"
