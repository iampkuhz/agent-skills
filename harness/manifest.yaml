# Feipi Agent Kit — Harness Manifest
# Auto-generated. Do not edit manually unless registering new resources.

version: "0.1.0"
name: "feipi-agent-kit"
description: "AI 工程助手仓库 — skills / tools / rules / commands 的创建、更新与验证"

# ---------------------------------------------------------------------------
# Entrypoints — AI agent 启动时加载的核心文档
# ---------------------------------------------------------------------------
entrypoints:
  - path: "AGENTS.md"
    type: "core-constraints"
    description: "核心约束与入口（强约束、目录路由、DoD）"
  - path: "CLAUDE.md"
    type: "detail"
    description: "详细说明（渐进式加载入口）"
  - path: "README.md"
    type: "overview"
    description: "仓库总览"
  - path: "docs/agent-handbook.md"
    type: "handbook"
    description: "Agent 操作手册"
  - path: "rules/README.md"
    type: "rules-index"
    description: "规则索引"

# ---------------------------------------------------------------------------
# Rules — 行为规则（仅已存在的文件）
# ---------------------------------------------------------------------------
rules:
  - path: "rules/global/language.md"
    scope: "global"
    description: "语言使用规范（中文优先）"

# ---------------------------------------------------------------------------
# Commands — 当前无已启用 command
# ---------------------------------------------------------------------------
commands:
