# 架构组件图需求模板（空白模板）
#
# 使用说明：
# 1. 复制此模板到您的项目目录，如 diagrams/briefs/my-brief.yaml
# 2. 将所有 <占位符> 替换为实际值
# 3. 运行校验：python scripts/validate_brief.py diagrams/briefs/my-brief.yaml
#
# 校验规则：assets/validation/brief-rules.yaml

# 图标识符（必填，3-50 字符，小写字母开头，仅含小写字母/数字/连字符）
# 示例：eip-4337-arch, user-auth-flow, payment-system
diagram_id: <diagram-id>

# 图类型（必填）
# 可选值：architecture | component
diagram_type: <architecture|component>

# 图标题（必填，5-100 字符）
title: "<图标题>"

# 分层定义（必填，至少 3 层）
layers:
  - id: <layer-id>
    name: <层名称>
    description: <层描述>
    color: "<#RRGGBB>"
  - id: <layer-id>
    name: <层名称>
    description: <层描述>
    color: "<#RRGGBB>"
  - id: <layer-id>
    name: <层名称>
    description: <层描述>
    color: "<#RRGGBB>"

# 组件清单（必填，至少 3 个）
# type 可选值：component | actor | database | note | interface | queue | folder | cloud
components:
  - id: <component-id>
    name: <组件名称>
    layer: <引用 layers[].id>
    description: <组件描述，可选>
    type: <component|actor|database|note|interface|queue|folder|cloud>
  - id: <component-id>
    name: <组件名称>
    layer: <引用 layers[].id>
    type: <type>
  - id: <component-id>
    name: <组件名称>
    layer: <引用 layers[].id>
    type: <type>

# 跨层流程（必填，至少 1 个）
# id 格式：S + 数字（如 S1, S2, S10）
# from/to 必须引用 components 中已定义的 id
flows:
  - id: S1
    from: <引用 component id>
    to: <引用 component id>
    description: <流程描述，2-100 字符>

# 边界条件（可选）
# boundaries:
#   - 不包含：<内容>

# 特殊要求（可选）
# requirements:
#   - 使用纵向布局 (top to bottom direction)
#   - 箭头必须标注 S 序号
#   - 必须包含图例
