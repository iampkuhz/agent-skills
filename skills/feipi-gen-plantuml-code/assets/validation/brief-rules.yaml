# PlantUML diagram-brief 校验规则配置
# 用于校验 architecture-brief.yaml 等需求模板文件

# 顶层字段配置
fields:
  diagram_id:
    type: string
    required: true
    min_length: 3
    max_length: 50
    pattern: "^[a-z][a-z0-9-]*$"
    description: "图的标识符，用于文件命名和引用"

  diagram_type:
    type: string
    required: true
    enum: ["architecture", "component"]
    description: "图类型"

  title:
    type: string
    required: true
    min_length: 5
    max_length: 100
    description: "图标题"

# 数组字段配置
arrays:
  layers:
    min_items: 3
    required: true
    fields:
      id:
        type: string
        required: true
        min_length: 2
        max_length: 30
        pattern: "^[a-z][a-z0-9-]*$"
      name:
        type: string
        required: true
        min_length: 2
        max_length: 50
      description:
        type: string
        required: true
        min_length: 1
      color:
        type: string
        required: true
        pattern: "^#([0-9A-Fa-f]{6}|[0-9A-Fa-f]{3})$"
        description: "十六进制颜色码"

  components:
    min_items: 3
    required: true
    fields:
      id:
        type: string
        required: true
        min_length: 2
        max_length: 40
        pattern: "^[a-z][a-z0-9_-]*$"
      name:
        type: string
        required: true
        min_length: 2
        max_length: 60
      layer:
        type: string
        required: true
        description: "引用 layers 中定义的 id"
      description:
        type: string
        required: false
      type:
        type: string
        required: true
        enum: ["component", "actor", "database", "note", "interface", "queue", "folder", "cloud"]

  flows:
    min_items: 1
    required: true
    fields:
      id:
        type: string
        required: true
        pattern: "^S\\d+$"
        description: "流程标识符，格式：S + 数字"
      from:
        type: string
        required: true
        description: "引用 components 中定义的 id"
      to:
        type: string
        required: true
        description: "引用 components 中定义的 id"
      description:
        type: string
        required: true
        min_length: 2
        max_length: 100

# 交叉引用校验
cross_references:
  - field: components[].layer
    references: layers[].id

  - field: flows[].from
    references: components[].id

  - field: flows[].to
    references: components[].id

# 可选字段（不强制校验）
optional_fields:
  boundaries:
    type: array
    description: "边界条件"

  requirements:
    type: array
    items:
      type: string
    description: "特殊要求"
