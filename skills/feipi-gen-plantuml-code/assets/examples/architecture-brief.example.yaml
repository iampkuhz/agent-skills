# 架构组件图需求示例（完整可运行）
# 此文件可通过校验：python scripts/validate_brief.py assets/examples/architecture-brief.example.yaml
#
# 示例场景：EIP-4337 账户抽象架构

diagram_id: eip-4337-arch
diagram_type: architecture
title: "EIP-4337 账户抽象架构图"

# 分层定义（至少 3 层）
layers:
  - id: protocol
    name: 协议层
    description: 协议核心组件和规则定义
    color: "#E3F2FD"
  - id: data
    name: 数据层
    description: 数据对象和存储结构
    color: "#FFF9C4"
  - id: external
    name: 外部参与方
    description: 用户、验证者等外部角色
    color: "#E0E0E0"

# 组件清单（至少 3 个）
components:
  - id: bundler
    name: Bundler
    layer: protocol
    description: 交易打包组件
    type: component
  - id: entrypoint
    name: EntryPoint 合约
    layer: protocol
    description: 核心入口点合约
    type: component
  - id: paymaster
    name: Paymaster
    layer: protocol
    description: 代付费用组件
    type: component
  - id: user-op
    name: UserOperation
    layer: data
    description: 用户操作对象
    type: database
  - id: wallet
    name: 智能合约钱包
    layer: external
    description: 用户的智能合约账户
    type: actor

# 跨层流程（至少 1 个）
flows:
  - id: S1
    from: wallet
    to: bundler
    description: 用户提交 UserOperation 到 Bundler
  - id: S2
    from: bundler
    to: entrypoint
    description: Bundler 打包交易到 EntryPoint
  - id: S3
    from: entrypoint
    to: paymaster
    description: EntryPoint 调用 Paymaster 验证代付

# 边界条件（可选）
boundaries:
  - 不包含：性能指标

# 特殊要求（可选）
requirements:
  - 使用纵向布局 (top to bottom direction)
  - 箭头必须标注 S 序号
  - 必须包含图例
