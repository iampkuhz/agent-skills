version: 1
interface:
  display_name: "技术汇报 PPT 单页"
  short_description: "将中文技术材料重构成 CTO 可读的高密度 PPT 单页，并强制执行版面预算、视觉 QA 和修复策略。生成后自动运行 pipeline（Static QA → Build PPTX → Render QA → Repair Plan），最多 3 轮自动迭代。"
  default_prompt: "请基于用户提供的原始材料，先做信息充足性检查，再输出 Page Contract；确认后生成 Slide IR 并运行 pipeline（validate → static QA → build PPTX → render QA → repair plan），完成渲染检查、视觉 QA 和必要修复。"
