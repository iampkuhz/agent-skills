version: '3.8'

services:
  # SearXNG MCP Service
  searxng-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: searxng-mcp
    ports:
      - "8888:8888"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_TIMEOUT=30.0
      - SEARXNG_MCP_PORT=8888
      - SEARXNG_MCP_TRANSPORT=streamable-http
    depends_on:
      - searxng
    networks:
      - searxng-network

  # SearXNG 搜索引擎（如果尚未运行）
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    ports:
      - "8873:8080"
    volumes:
      - ../../searxng/settings:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8873
    networks:
      - searxng-network

networks:
  searxng-network:
    driver: bridge
