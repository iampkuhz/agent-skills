<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agent Session Browser{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        :root {
            --bg: #fafbfc;
            --surface: #ffffff;
            --surface-hover: #f6f8fa;
            --border: #e8ecf0;
            --border-light: #f0f2f5;
            --text: #1a1a2e;
            --text-secondary: #5f6b7a;
            --text-muted: #8b95a5;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-bg: #eef2ff;
            --claude: #8b5cf6;
            --claude-bg: #f3f0ff;
            --codex: #10b981;
            --codex-bg: #ecfdf5;
            --accent: #f59e0b;
            --accent-bg: #fffbeb;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --sidebar-w: 240px;
            --header-h: 56px;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --transition: 150ms ease;
        }

        /* Reset */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: 14px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Sidebar ─────────────────────────────────────────────── */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
        }

        .sidebar-logo {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo a {
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo .logo-icon {
            width: 28px; height: 28px;
            background: var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }
        .sidebar-logo .logo-text {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: all var(--transition);
        }
        .sidebar-nav a:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .sidebar-nav a.active {
            background: var(--primary-bg);
            color: var(--primary);
        }
        .sidebar-nav a .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
        }
        .sidebar-nav a .nav-badge {
            margin-left: auto;
            font-size: 11px;
            font-weight: 600;
            background: var(--border-light);
            color: var(--text-muted);
            padding: 1px 7px;
            border-radius: 10px;
        }
        .sidebar-nav a.active .nav-badge {
            background: var(--primary);
            color: white;
        }

        .sidebar-search {
            padding: 10px 12px 16px;
            border-top: 1px solid var(--border);
        }
        .sidebar-search form {
            display: flex;
            gap: 6px;
        }
        .sidebar-search input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12px;
            outline: none;
            background: var(--bg);
            color: var(--text);
            transition: border-color var(--transition);
        }
        .sidebar-search input:focus {
            border-color: var(--primary);
        }
        .sidebar-search input::placeholder {
            color: var(--text-muted);
        }
        .sidebar-search button {
            padding: 7px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition);
        }
        .sidebar-search button:hover {
            opacity: 0.9;
        }

        /* ─── Main area ───────────────────────────────────────────── */
        .main-area {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
        }

        /* ─── Header bar ──────────────────────────────────────────── */
        .topbar {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 28px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .topbar-breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .topbar-breadcrumb a:hover {
            color: var(--primary);
        }
        .topbar-breadcrumb .sep {
            color: var(--border);
        }

        /* ─── Content ─────────────────────────────────────────────── */
        .content {
            padding: 28px;
            max-width: 1200px;
        }

        /* ─── Cards ───────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
        }
        .card + .card {
            margin-top: 20px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Stat cards ──────────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ─── Tables ──────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }
        tbody tr {
            transition: background var(--transition);
        }
        tbody tr:hover {
            background: var(--surface-hover);
        }

        /* ─── Badges ──────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .badge-claude { background: var(--claude-bg); color: var(--claude); }
        .badge-codex { background: var(--codex-bg); color: var(--codex); }
        .badge-primary { background: var(--primary-bg); color: var(--primary); }
        .badge-muted { background: var(--border-light); color: var(--text-muted); }

        /* ─── Links ──────────────────────────────────────────────── */
        a.link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        a.link:hover {
            text-decoration: underline;
        }

        /* ─── Agent dot ───────────────────────────────────────────── */
        .agent-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .agent-dot.claude { background: var(--claude); }
        .agent-dot.codex { background: var(--codex); }

        /* ─── Token bar ───────────────────────────────────────────── */
        .token-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--border-light);
            overflow: hidden;
            display: flex;
        }
        .token-bar__input { background: #6366f1; }
        .token-bar__output { background: #10b981; }
        .token-bar__cache-read { background: #f59e0b; }
        .token-bar__cache-write { background: #06b6d4; }
        .token-bar--overview {
            height: 10px;
            border-radius: 5px;
        }
        .token-bar--round {
            height: 6px;
            border-radius: 3px;
        }
        .token-bar__segment {
            height: 100%;
            transition: width 300ms ease;
        }
        .token-bar__label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .token-bar__dot {
            width: 8px; height: 8px;
            border-radius: 2px;
        }

        /* ─── Conversation rounds ─────────────────────────────────── */
        .round {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }
        .round:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .round-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 0;
        }
        .round-number {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--border-light);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .round-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        .round-token-bar {
            flex: 1;
            max-width: 200px;
        }

        .msg {
            margin-bottom: 8px;
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.7;
            font-size: 13px;
        }
        .msg--user {
            background: var(--primary-bg);
            border-left: 3px solid var(--primary);
            margin-right: 40px;
        }
        .msg--assistant {
            background: var(--codex-bg);
            border-right: 3px solid var(--codex);
            margin-left: 40px;
        }
        .msg__meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .msg__body {
            color: var(--text);
        }
        .msg__body h1, .msg__body h2, .msg__body h3 {
            margin: 12px 0 6px;
            font-weight: 600;
        }
        .msg__body h1 { font-size: 18px; }
        .msg__body h2 { font-size: 16px; }
        .msg__body h3 { font-size: 14px; }
        .msg__body p { margin: 6px 0; }
        .msg__body ul, .msg__body ol {
            margin: 6px 0 6px 20px;
        }
        .msg__body pre {
            margin: 10px 0;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
        }
        .msg__body pre code {
            background: none;
            padding: 0;
            font-size: inherit;
        }
        .msg__body code {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
            font-size: 12px;
            background: var(--border-light);
            padding: 1px 5px;
            border-radius: 3px;
        }
        .msg__body pre code {
            background: none;
            padding: 0;
        }
        .msg__body blockquote {
            border-left: 3px solid var(--border);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }
        .msg__body table {
            margin: 8px 0;
            font-size: 12px;
        }
        .msg__body table th,
        .msg__body table td {
            padding: 6px 10px;
            border: 1px solid var(--border);
        }

        /* ─── Tool call details ───────────────────────────────────── */
        .tool-call-section {
            margin-top: 8px;
        }
        .tool-call-section summary {
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 6px 0;
        }
        .tool-call-section summary:hover {
            color: var(--primary);
        }
        .tool-call-detail {
            margin-top: 6px;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12px;
            font-family: "SF Mono", "Fira Code", monospace;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        /* ─── Breadcrumb nav ──────────────────────────────────────── */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            color: var(--primary);
        }
        .breadcrumb .sep {
            color: var(--border);
        }
        .breadcrumb .current {
            color: var(--text);
            font-weight: 500;
        }

        /* ─── Session header ──────────────────────────────────────── */
        .session-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }
        .session-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            flex: 1;
        }

        /* ─── Metadata strip ──────────────────────────────────────── */
        .meta-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 12px 0;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 20px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .meta-item strong {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .meta-item .mono {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 11px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── Token overview ──────────────────────────────────────── */
        .token-overview {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        .token-overview__bar {
            flex: 1;
        }
        .token-overview__labels {
            display: flex;
            gap: 14px;
        }

        /* ─── Truncate ────────────────────────────────────────────── */
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 280px;
        }

        /* ─── Empty state ─────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* ─── Footer ──────────────────────────────────────────────── */
        .footer {
            padding: 16px 28px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ─── Utility ─────────────────────────────────────────────── */
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 12px; }
        .text-xs { font-size: 11px; }
        .mono { font-family: "SF Mono", "Fira Code", monospace; }
        .mt-3 { margin-top: 12px; }
        .mt-4 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="/dashboard">
                <span class="logo-icon">AS</span>
                <span class="logo-text">Session Browser</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>
                <span class="nav-icon">◉</span> Dashboard
            </a>
            <a href="/projects" {% if active_page == 'projects' %}class="active"{% endif %}>
                <span class="nav-icon"></span> Projects
            </a>
            <a href="/agents" {% if active_page == 'agents' %}class="active"{% endif %}>
                <span class="nav-icon">⚡</span> Agents
            </a>
        </nav>
        <div class="sidebar-search">
            <form action="/search" method="get">
                <input type="text" name="q" placeholder="Search sessions..." value="{{ search_query or '' }}">
                <button type="submit">Go</button>
            </form>
        </div>
    </aside>

    <!-- Main -->
    <div class="main-area">
        <!-- Top bar -->
        <header class="topbar">
            {% block topbar %}
            <div class="topbar-breadcrumb">
                <a href="/dashboard">Dashboard</a>
            </div>
            {% endblock %}
        </header>

        <!-- Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <footer class="footer">
            Agent Session Browser &middot; Read-only &middot; Local
        </footer>
    </div>
</body>
</html>
