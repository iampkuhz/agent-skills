<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Agent Run Profiler{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">

    <!-- arpStorage bootstrap: defined early so page scripts can use it before shared JS loads -->
    <script>
    (function() {
        'use strict';
        var STORAGE_PREFIX = 'arp_';
        window.arpStorage = {
            get: function(key) {
                try {
                    var raw = localStorage.getItem(STORAGE_PREFIX + key);
                    return raw ? JSON.parse(raw) : null;
                } catch (e) { return null; }
            },
            set: function(key, value) {
                try {
                    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
                } catch (e) { /* storage full or disabled */ }
            },
            remove: function(key) {
                try {
                    localStorage.removeItem(STORAGE_PREFIX + key);
                } catch (e) {}
            }
        };
    })();
    </script>

    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="/dashboard">
                <span class="logo-icon">AP</span>
                <div>
                    <span class="logo-text">Agent Run Profiler</span>
                    <div class="logo-sub">Read-only · Local</div>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>
                <span class="nav-icon">◉</span> Dashboard
            </a>
            <a href="/projects" {% if active_page == 'projects' %}class="active"{% endif %}>
                <span class="nav-icon">◎</span> Projects
            </a>
            <a href="/sessions" {% if active_page == 'sessions' %}class="active"{% endif %}>
                <span class="nav-icon">●</span> Sessions
            </a>
            <a href="/search" {% if active_page == 'search' %}class="active"{% endif %}>
                <span class="nav-icon">⌕</span> Search
            </a>
            <a href="/agents" {% if active_page == 'agents' %}class="active"{% endif %}>
                <span class="nav-icon">⚡</span> Agents
            </a>
            <a href="/glossary" {% if active_page == 'glossary' %}class="active"{% endif %}>
                <span class="nav-icon">$</span> Token Glossary
            </a>
        </nav>
        <button class="sidebar-toggle" aria-label="收起侧边栏" aria-expanded="true">‹</button>
    </aside>
    <button class="sidebar-toggle-expand" aria-label="展开侧边栏" aria-expanded="false">›</button>

    <!-- Main -->
    <div class="main-area">
        <!-- Top bar -->
        <header class="topbar">
            {% block topbar %}
            <div class="topbar-breadcrumb">
                <a href="/dashboard">Dashboard</a>
            </div>
            {% endblock %}
        </header>

        <!-- Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <footer class="footer">
            Agent Run Profiler · Read-only · Local
        </footer>
    </div>

    <!-- Shared JS: tab switching, round toggle, show-more, restore state -->
    <script>
    (function() {
        'use strict';

        /* ─── Tab switching (session detail) ───────────────────────── */
        window.switchTab = function(tabId) {
            var tabs = document.querySelectorAll('.tab');
            var contents = document.querySelectorAll('.tab-content');
            tabs.forEach(function(t) { t.classList.remove('active'); });
            contents.forEach(function(c) { c.classList.remove('active'); });
            var target = document.querySelector('[data-tab="' + tabId + '"]');
            if (target) { target.classList.add('active'); }
            var content = document.getElementById(tabId);
            if (content) {
                // Lazy-load profile tab from <template> on first access
                if (tabId === 'profile' && !content.dataset.loaded) {
                    var tpl = document.getElementById('profile-template');
                    if (tpl) {
                        content.innerHTML = '';
                        while (tpl.content.firstChild) {
                            content.appendChild(tpl.content.firstChild);
                        }
                        content.dataset.loaded = '1';
                    }
                }
                content.classList.add('active');
            }
            // Persist active tab
            if (window._sessionId) {
                arpStorage.set('session_tab_' + window._sessionId, tabId);
            }
        };

        /* ─── Round expand/collapse with localStorage persistence ──── */
        function toggleRound(round) {
            var wasExpanded = round.classList.contains('expanded');
            if (wasExpanded) {
                round.classList.remove('expanded');
            } else {
                round.classList.add('expanded');
            }
            // Persist state
            if (window._sessionId && round.dataset.roundIdx) {
                var key = 'rounds_' + window._sessionId;
                var expanded = arpStorage.get(key) || [];
                var idx = round.dataset.roundIdx;
                var pos = expanded.indexOf(idx);
                if (wasExpanded) {
                    if (pos >= 0) expanded.splice(pos, 1);
                } else {
                    if (pos < 0) expanded.push(idx);
                }
                arpStorage.set(key, expanded);
            }
        }

        /* ─── Show more / less ─────────────────────────────────────── */
        function toggleShowMore(btn) {
            // Prefer modal if available (session detail page overrides this)
            if (window.openContentModal && btn.getAttribute('data-content-modal')) {
                window.openContentModal(btn);
                return;
            }
            var body = btn.previousElementSibling;
            if (body) {
                body.classList.toggle('expanded');
                btn.textContent = body.classList.contains('expanded') ? 'Show less' : 'Show more';
            }
        }

        /* ─── Global click delegation ──────────────────────────────── */
        document.addEventListener('click', function(e) {
            var header = e.target.closest('.round-header');
            if (header) {
                var round = header.closest('.round');
                if (round) toggleRound(round);
                return;
            }
            var showMore = e.target.closest('.show-more');
            if (showMore) {
                toggleShowMore(showMore);
                return;
            }
        });


        /* ─── Wide table scroll hints ────────────────────────────── */
        document.addEventListener('scroll', function(e) {
            var wrap = e.target.closest('.table-wrap');
            if (!wrap) return;
            var isAtRight = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 2;
            if (isAtRight) {
                wrap.classList.add('scrolled-right');
            } else {
                wrap.classList.remove('scrolled-right');
            }
        }, true);


        /* ─── Restore session tab on load ──────────────────────────── */
        if (window._sessionId) {
            var savedTab = arpStorage.get('session_tab_' + window._sessionId);
            if (savedTab) {
                setTimeout(function() { switchTab(savedTab); }, 0);
            }
            /* Restore expanded rounds (table-based structure) */
            var savedRounds = arpStorage.get('rounds_' + window._sessionId);
            if (savedRounds && Array.isArray(savedRounds)) {
                savedRounds.forEach(function(idx) {
                    var headerRow = document.querySelector('.round-header-row[data-round-idx="' + idx + '"]');
                    if (headerRow && window.toggleRoundDetail) {
                        toggleRoundDetail(headerRow);
                    } else {
                        // Fallback for old .round structure
                        var oldRound = document.querySelector('.round[data-round-idx="' + idx + '"]');
                        if (oldRound) oldRound.classList.add('expanded');
                    }
                });
            }
        }

        /* ─── Sidebar collapse toggle ─────────────────────────────── */
        var sidebarToggleBtn = document.querySelector('.sidebar-toggle');
        var sidebarExpandBtn = document.querySelector('.sidebar-toggle-expand');
        if (sidebarToggleBtn || sidebarExpandBtn) {
            function applySidebarState(collapsed) {
                if (collapsed) {
                    document.body.classList.add('sidebar-collapsed');
                    if (sidebarToggleBtn) {
                        sidebarToggleBtn.setAttribute('aria-expanded', 'false');
                        sidebarToggleBtn.textContent = '‹';
                    }
                    if (sidebarExpandBtn) {
                        sidebarExpandBtn.setAttribute('aria-expanded', 'false');
                        sidebarExpandBtn.textContent = '›';
                    }
                } else {
                    document.body.classList.remove('sidebar-collapsed');
                    if (sidebarToggleBtn) {
                        sidebarToggleBtn.setAttribute('aria-expanded', 'true');
                        sidebarToggleBtn.textContent = '‹';
                    }
                    if (sidebarExpandBtn) {
                        sidebarExpandBtn.setAttribute('aria-expanded', 'false');
                        sidebarExpandBtn.textContent = '›';
                    }
                }
            }

            function toggleSidebar() {
                var isCollapsed = document.body.classList.contains('sidebar-collapsed');
                applySidebarState(!isCollapsed);
                arpStorage.set('sidebar_collapsed', !isCollapsed);
            }

            /* Restore persisted state */
            var savedCollapsed = arpStorage.get('sidebar_collapsed');
            if (savedCollapsed) {
                applySidebarState(true);
            }

            if (sidebarToggleBtn) {
                sidebarToggleBtn.addEventListener('click', toggleSidebar);
            }
            if (sidebarExpandBtn) {
                sidebarExpandBtn.addEventListener('click', toggleSidebar);
            }
        }

    })();
    </script>
</body>
</html>
