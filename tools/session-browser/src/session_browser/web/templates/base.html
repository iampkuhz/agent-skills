<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agent Run Profiler{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ─── Color tokens ──────────────────────────────────────────────── */
        :root {
            /* Neutral */
            --bg: #fafbfc;
            --surface: #ffffff;
            --surface-hover: #f6f8fa;
            --panel: #f1f5f9;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            /* Token colors (semantic) */
            --token-input-fresh: #3b82f6;
            --token-input-fresh-bg: #eff6ff;
            --token-cache-read: #f59e0b;
            --token-cache-read-bg: #fffbeb;
            --token-cache-write: #f97316;
            --token-cache-write-bg: #fff7ed;
            --token-output-visible: #10b981;
            --token-output-visible-bg: #ecfdf5;
            --token-reasoning: #8b5cf6;
            --token-reasoning-bg: #f5f3ff;
            --token-tool: #06b6d4;
            --token-tool-bg: #ecfeff;
            --token-unknown: #6b7280;
            --token-unknown-bg: #f3f4f6;

            /* Status colors */
            --status-success: #10b981;
            --status-success-bg: #ecfdf5;
            --status-warning: #f59e0b;
            --status-warning-bg: #fffbeb;
            --status-error: #ef4444;
            --status-error-bg: #fef2f2;
            --status-unknown: #6b7280;

            /* Agent colors */
            --agent-claude: #8b5cf6;
            --agent-claude-bg: #f5f3ff;
            --agent-codex: #10b981;
            --agent-codex-bg: #ecfdf5;

            /* Accent */
            --accent: #6366f1;
            --accent-bg: #eef2ff;

            /* Layout */
            --sidebar-w: 210px;
            --header-h: 48px;
            --content-max: 1400px;

            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;

            /* Typography scale */
            --text-base: 14px;
            --text-sm: 13px;
            --text-xs: 12px;
            --text-micro: 11px;
            --text-metric: 26px;
            --text-metric-sm: 20px;

            /* Fonts */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Menlo, monospace;

            /* Border */
            --radius: 6px;
            --radius-sm: 4px;
            --radius-md: 8px;

            /* Shadow */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
        }

        /* ─── Reset ───────────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: var(--text-base); }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Reduced motion ──────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ─── Sidebar ─────────────────────────────────────────────────── */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
        }
        .sidebar-logo {
            padding: 14px 16px 12px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo a {
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-logo .logo-icon {
            width: 24px; height: 24px;
            background: var(--accent);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: var(--text-micro);
            font-weight: 700;
        }
        .sidebar-logo .logo-text {
            font-size: var(--text-sm);
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .sidebar-logo .logo-sub {
            font-size: var(--text-xs);
            color: var(--text-muted);
            font-weight: 400;
        }
        .sidebar-nav {
            flex: 1;
            padding: 8px 8px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: var(--text-xs);
            font-weight: 500;
            transition: all 150ms ease;
        }
        .sidebar-nav a:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .sidebar-nav a.active {
            background: var(--accent-bg);
            color: var(--accent);
        }
        .sidebar-nav a .nav-icon {
            width: 16px;
            text-align: center;
            font-size: var(--text-xs);
            opacity: 0.7;
        }

        /* ─── Main area ───────────────────────────────────────────────── */
        .main-area {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
        }

        /* ─── Top bar ─────────────────────────────────────────────────── */
        .topbar {
            height: var(--header-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
        }
        .topbar-title {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text);
        }
        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: var(--text-xs);
            color: var(--text-muted);
        }
        .topbar-breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
        }
        .topbar-breadcrumb a:hover { color: var(--accent); }
        .topbar-breadcrumb .sep { color: var(--border); }
        .topbar-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Content ─────────────────────────────────────────────────── */
        .content {
            padding: var(--space-lg) 20px;
            max-width: var(--content-max);
        }

        /* ─── Cards ───────────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
        }
        .card + .card { margin-top: var(--space-md); }
        .card-title {
            font-size: var(--text-xs);
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ─── Metric section labels ───────────────────────────────────── */
        .metric-section-label {
            font-size: var(--text-micro);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: 4px 0 2px;
        }
        .metric-section-label:first-child { padding-top: 0; }

        /* ─── Metric cards ────────────────────────────────────────────── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            margin-bottom: var(--space-lg);
        }
        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 8px;
            min-height: 48px;
            position: relative;
        }
        .metric-card .metric-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .metric-card .metric-value {
            font-size: var(--text-metric-sm);
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            white-space: nowrap;
        }
        .metric-card .metric-sub {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: 2px;
            width: 100%;
        }
        .metric-card--compact .metric-value {
            font-size: var(--text-metric-sm);
        }

        /* ─── Tables ──────────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-xs);
        }
        th {
            text-align: left;
            padding: 6px 10px;
            font-weight: 600;
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 10;
        }
        th:hover { color: var(--text); }
        th[aria-sort="ascending"]::after { content: " \2191"; }
        th[aria-sort="descending"]::after { content: " \2193"; }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
            white-space: nowrap;
        }
        /* Numeric columns: right-align */
        td.numeric, th.numeric { text-align: right; }
        tbody tr { transition: background 150ms ease; }
        tbody tr:hover { background: var(--surface-hover); }
        td.muted-zero { color: var(--text-muted); opacity: 0.5; }

        /* ─── Badges ──────────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 1px 7px;
            border-radius: 999px;
            font-size: var(--text-micro);
            font-weight: 600;
            white-space: nowrap;
            line-height: 1.5;
        }
        .badge-claude { background: var(--agent-claude-bg); color: var(--agent-claude); }
        .badge-codex { background: var(--agent-codex-bg); color: var(--agent-codex); }
        .badge-primary { background: var(--accent-bg); color: var(--accent); }
        .badge-muted { background: var(--border-light); color: var(--text-muted); }
        .badge-success { background: var(--status-success-bg); color: var(--status-success); }
        .badge-warning { background: var(--status-warning-bg); color: var(--status-warning); }
        .badge-error { background: var(--status-error-bg); color: var(--status-error); }
        .badge-estimated { background: var(--status-warning-bg); color: var(--status-warning); }

        /* Token-specific badges */
        .token-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: var(--text-micro);
            font-weight: 500;
            font-family: var(--font-mono);
        }
        .token-badge--input { background: var(--token-input-fresh-bg); color: var(--token-input-fresh); }
        .token-badge--cache-read { background: var(--token-cache-read-bg); color: var(--token-cache-read); }
        .token-badge--cache-write { background: var(--token-cache-write-bg); color: var(--token-cache-write); }
        .token-badge--output { background: var(--token-output-visible-bg); color: var(--token-output-visible); }
        .token-badge--reasoning { background: var(--token-reasoning-bg); color: var(--token-reasoning); }
        .token-badge--unknown { background: var(--token-unknown-bg); color: var(--token-unknown); }

        /* ─── Links ───────────────────────────────────────────────────── */
        a.link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        a.link:hover { text-decoration: underline; }
        a.link-muted {
            color: var(--text-secondary);
            text-decoration: none;
        }
        a.link-muted:hover { color: var(--accent); }

        /* ─── Agent dot ───────────────────────────────────────────────── */
        .agent-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .agent-dot.claude { background: var(--agent-claude); }
        .agent-dot.codex { background: var(--agent-codex); }

        /* ─── Token bars ──────────────────────────────────────────────── */
        .token-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--border-light);
            overflow: hidden;
            display: flex;
            position: relative;
        }
        .token-bar__input-fresh { background: var(--token-input-fresh); }
        .token-bar__cache-read { background: var(--token-cache-read); }
        .token-bar__cache-write { background: var(--token-cache-write); }
        .token-bar__output { background: var(--token-output-visible); }
        .token-bar__reasoning { background: var(--token-reasoning); }
        .token-bar__tool { background: var(--token-tool); }
        .token-bar--sm { height: 4px; }
        .token-bar--lg { height: 8px; border-radius: 4px; }

        .token-bar__label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: var(--text-micro);
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .token-bar__dot {
            width: 6px; height: 6px;
            border-radius: 2px;
        }

        /* Token bar with hover tooltip */
        .token-bar-group {
            position: relative;
        }
        .token-bar-group:hover .token-bar-tooltip { opacity: 1; visibility: visible; transform: translateY(0); }

        .token-bar-tooltip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: var(--text);
            color: var(--surface);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: var(--text-micro);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 150ms ease, transform 150ms ease;
            z-index: 50;
            pointer-events: none;
            font-family: var(--font-mono);
            box-shadow: var(--shadow);
        }
        .token-bar-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: var(--text);
        }

        /* ─── Conversation rounds ─────────────────────────────────────── */
        .round {
            border-bottom: 1px solid var(--border-light);
        }
        .round:last-child { border-bottom: none; }

        /* Collapsed round header */
        .round-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            cursor: pointer;
            user-select: none;
            border-radius: var(--radius-sm);
        }
        .round-header:hover { background: var(--surface-hover); }
        .round-number {
            font-size: var(--text-micro);
            font-weight: 600;
            color: var(--text-muted);
            background: var(--border-light);
            padding: 1px 6px;
            border-radius: 3px;
            font-family: var(--font-mono);
        }
        .round-role {
            font-size: var(--text-micro);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .round-role--user { color: var(--accent); }
        .round-role--assistant { color: var(--text-secondary); }
        .round-role--tool { color: var(--token-tool); }
        .round-summary {
            flex: 1;
            font-size: var(--text-sm);
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-mono);
        }
        .round-token-count {
            font-size: var(--text-micro);
            color: var(--text-muted);
            font-family: var(--font-mono);
            white-space: nowrap;
        }
        .round-chevron {
            font-size: var(--text-micro);
            color: var(--text-muted);
            transition: transform 180ms ease;
            flex-shrink: 0;
        }
        .round.expanded .round-chevron { transform: rotate(90deg); }
        .round.has-failed { border-left: 2px solid var(--status-error); padding-left: 6px; }
        .round.has-high-tokens { border-left: 2px solid var(--status-warning); padding-left: 6px; }

        /* Expanded round content */
        .round-content {
            display: none;
            padding: 8px 0 12px;
        }
        .round.expanded .round-content { display: block; }

        /* ─── Messages ────────────────────────────────────────────────── */
        .msg {
            margin-bottom: 8px;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: var(--text-sm);
            line-height: 1.6;
        }
        .msg--user {
            background: var(--accent-bg);
            border-left: 2px solid var(--accent);
        }
        .msg--assistant {
            background: var(--surface-hover);
            border-left: 2px solid var(--border);
        }
        .msg__meta {
            font-size: var(--text-micro);
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .msg__body {
            color: var(--text);
            max-height: 300px;
            overflow-y: auto;
        }
        .msg__body.expanded { max-height: none; }
        .msg__body h1 { margin: 12px 0 6px; font-size: 16px; font-weight: 600; }
        .msg__body h2 { margin: 10px 0 4px; font-size: 14px; font-weight: 600; }
        .msg__body h3 { margin: 8px 0 4px; font-size: 13px; font-weight: 600; }
        .msg__body p { margin: 4px 0; }
        .msg__body pre {
            margin: 8px 0;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-size: var(--text-micro);
            line-height: 1.4;
            max-height: 200px;
        }
        .msg__body pre.expanded { max-height: none; }
        .msg__body code {
            font-family: var(--font-mono);
            font-size: var(--text-micro);
            background: var(--border-light);
            padding: 1px 4px;
            border-radius: 3px;
        }
        .msg__body pre code {
            background: none;
            padding: 0;
        }
        .show-more {
            font-size: var(--text-micro);
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            padding: 2px 0;
            font-weight: 500;
        }
        .show-more:hover { text-decoration: underline; }

        /* ─── Tool call tree ──────────────────────────────────────────── */
        .tool-tree {
            font-family: var(--font-mono);
            font-size: var(--text-micro);
        }
        .tool-tree__item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .tool-tree__item:last-child { border-bottom: none; }
        .tool-tree__icon {
            width: 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .tool-tree__name {
            font-weight: 600;
            min-width: 70px;
            flex-shrink: 0;
        }
        .tool-tree__detail {
            color: var(--text-muted);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tool-tree__status {
            flex-shrink: 0;
        }
        .tool-tree__item--error {
            color: var(--status-error);
        }
        .tool-tree__item--error .tool-tree__name {
            color: var(--status-error);
        }

        /* ─── Tabs ────────────────────────────────────────────────────── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
            gap: 0;
        }
        .tab {
            padding: 6px 14px;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 150ms ease;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ─── Session header (compact) ────────────────────────────────── */
        .session-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-md);
            margin-bottom: var(--space-sm);
        }
        .session-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .session-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .session-meta__item {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .session-meta__item .mono {
            font-family: var(--font-mono);
            font-size: var(--text-micro);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── Meta strip ──────────────────────────────────────────────── */
        .meta-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 8px 0;
            font-size: var(--text-xs);
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 12px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .meta-item strong {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ─── Truncate ────────────────────────────────────────────────── */
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .truncate-mid {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mono { font-family: var(--font-mono); }

        /* ─── Tooltip (general) ───────────────────────────────────────── */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: var(--text);
            color: var(--surface);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: var(--text-micro);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 150ms ease, transform 150ms ease;
            z-index: 50;
            pointer-events: none;
            box-shadow: var(--shadow);
        }
        [data-tooltip]:hover::after,
        [data-tooltip]:focus::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Search / filter bar ─────────────────────────────────────── */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
            align-items: center;
        }
        .filter-bar__input {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            background: var(--surface);
            font-family: var(--font-mono);
            outline: none;
            min-width: 0;
        }
        .filter-bar__input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-bg);
        }
        .filter-bar__select {
            padding: 4px 6px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            background: var(--surface);
            outline: none;
        }
        .filter-bar__btn {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: var(--text-xs);
            background: var(--surface);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 150ms ease;
        }
        .filter-bar__btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        .filter-bar__btn--primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .filter-bar__btn--primary:hover {
            background: #4f46e5;
        }

        /* ─── Empty state ─────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: var(--text-sm);
        }

        /* ─── Footer ──────────────────────────────────────────────────── */
        .footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            font-size: var(--text-micro);
            color: var(--text-muted);
        }

        /* ─── Utility ─────────────────────────────────────────────────── */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .gap-1 { gap: 4px; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: var(--text-sm); }
        .text-xs { font-size: var(--text-xs); }
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 12px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .ml-auto { margin-left: auto; }

        /* ─── Keyboard hint ───────────────────────────────────────────── */
        .kbd {
            display: inline-block;
            padding: 1px 5px;
            font-size: 9px;
            font-family: var(--font-mono);
            background: var(--border-light);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text-muted);
        }

        /* ─── Chart container ─────────────────────────────────────────── */
        .chart-container {
            width: 100%;
            position: relative;
        }
        .chart-legend {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .chart-legend__item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: var(--text-micro);
            color: var(--text-muted);
        }
        .chart-legend__dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        /* ─── Token profile table ──────────────────────────────────────── */
        .token-profile__section {
            margin-bottom: var(--space-md);
        }
        .token-profile__label {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .token-profile__row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 0;
            font-size: var(--text-xs);
        }
        .token-profile__name {
            min-width: 120px;
            color: var(--text-secondary);
        }
        .token-profile__value {
            font-family: var(--font-mono);
            font-weight: 500;
        }
        .token-profile__pct {
            color: var(--text-muted);
            min-width: 50px;
        }
        .token-profile__bar {
            flex: 1;
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
        }
        .token-profile__bar-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* ─── Agents cards ────────────────────────────────────────────── */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--space-md);
        }
        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: box-shadow 150ms ease, border-color 150ms ease;
        }
        .agent-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }
        .agent-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .agent-card__name {
            font-size: var(--text-sm);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .agent-card__stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }
        .agent-card__stat {
            display: flex;
            flex-direction: column;
        }
        .agent-card__stat-label {
            font-size: var(--text-micro);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .agent-card__stat-value {
            font-size: var(--text-sm);
            font-weight: 600;
        }
        .agent-card__models {
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--border-light);
        }

        /* ─── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 1200px) {
            .content { padding: var(--space-md) 16px; }
        }
        @media (max-width: 800px) {
            .sidebar { width: 48px; }
            .sidebar-logo .logo-text,
            .sidebar-logo .logo-sub,
            .sidebar-nav a span:not(.nav-icon) { display: none; }
            .sidebar-nav a { justify-content: center; padding: 8px; }
            .main-area { margin-left: 48px; }
            .topbar { padding: 0 12px; }
            .content { padding: var(--space-sm) 12px; }
        }
        @media (max-width: 480px) {
            .sidebar { width: 0; overflow: hidden; }
            .main-area { margin-left: 0; }
            .metrics-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }

        /* ─── Highlighting ────────────────────────────────────────────── */
        .row--failed { background: var(--status-error-bg) !important; }
        .row--error { background: var(--status-error-bg) !important; }
        .highlight-warn { color: var(--status-warning); font-weight: 600; }
        .highlight-error { color: var(--status-error); font-weight: 600; }

        /* ─── Dashboard trend chart buttons ───────────────────────────── */
        .tab--chart {
            padding: 2px 8px;
            font-size: var(--text-micro);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            background: var(--surface);
            color: var(--text-muted);
        }
        .tab--chart.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ─── Token breakdown compact ─────────────────────────────────── */
        .token-breakdown-compact {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .token-breakdown-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--text-xs);
        }
        .token-breakdown-row .label {
            min-width: 90px;
            font-weight: 500;
            font-size: var(--text-xs);
        }
        .token-breakdown-row .value {
            font-family: var(--font-mono);
            min-width: 60px;
            font-size: var(--text-xs);
        }
        .token-breakdown-row .bar {
            flex: 1;
            height: 5px;
            background: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
        }
        .token-breakdown-row .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 200ms ease;
        }

        /* ─── Stats grid for agent detail ─────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            margin-bottom: var(--space-lg);
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            box-shadow: var(--shadow-sm);
        }
        .stat-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .stat-value {
            font-size: var(--text-metric-sm);
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .stat-sub {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>

    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="/dashboard">
                <span class="logo-icon">AP</span>
                <div>
                    <span class="logo-text">Agent Run Profiler</span>
                    <div class="logo-sub">Read-only · Local</div>
                </div>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>
                <span class="nav-icon">◉</span> Dashboard
            </a>
            <a href="/projects" {% if active_page == 'projects' %}class="active"{% endif %}>
                <span class="nav-icon">◎</span> Projects
            </a>
            <a href="/sessions" {% if active_page == 'sessions' %}class="active"{% endif %}>
                <span class="nav-icon">●</span> Sessions
            </a>
            <a href="/agents" {% if active_page == 'agents' %}class="active"{% endif %}>
                <span class="nav-icon">⚡</span> Agents
            </a>
            <a href="/glossary" {% if active_page == 'glossary' %}class="active"{% endif %}>
                <span class="nav-icon">$</span> Token Glossary
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main-area">
        <!-- Top bar -->
        <header class="topbar">
            {% block topbar %}
            <div class="topbar-breadcrumb">
                <a href="/dashboard">Dashboard</a>
            </div>
            {% endblock %}
        </header>

        <!-- Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <footer class="footer">
            Agent Run Profiler · Read-only · Local
        </footer>
    </div>

    <!-- Shared JS: localStorage helpers, tooltips, interactions -->
    <script>
    (function() {
        'use strict';

        /* ─── localStorage helpers with safe try/catch ─────────────── */
        var STORAGE_PREFIX = 'arp_';

        window.arpStorage = {
            get: function(key) {
                try {
                    var raw = localStorage.getItem(STORAGE_PREFIX + key);
                    return raw ? JSON.parse(raw) : null;
                } catch (e) {
                    return null;
                }
            },
            set: function(key, value) {
                try {
                    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
                } catch (e) { /* storage full or disabled */ }
            },
            remove: function(key) {
                try {
                    localStorage.removeItem(STORAGE_PREFIX + key);
                } catch (e) {}
            }
        };

        /* ─── Tab switching (session detail) ───────────────────────── */
        window.switchTab = function(tabId) {
            var tabs = document.querySelectorAll('.tab');
            var contents = document.querySelectorAll('.tab-content');
            tabs.forEach(function(t) { t.classList.remove('active'); });
            contents.forEach(function(c) { c.classList.remove('active'); });
            var target = document.querySelector('[data-tab="' + tabId + '"]');
            if (target) { target.classList.add('active'); }
            var content = document.getElementById(tabId);
            if (content) { content.classList.add('active'); }
            // Persist active tab
            if (window._sessionId) {
                arpStorage.set('session_tab_' + window._sessionId, tabId);
            }
        };

        /* ─── Round expand/collapse with localStorage persistence ──── */
        function toggleRound(round) {
            var wasExpanded = round.classList.contains('expanded');
            if (wasExpanded) {
                round.classList.remove('expanded');
            } else {
                round.classList.add('expanded');
            }
            // Persist state
            if (window._sessionId && round.dataset.roundIdx) {
                var key = 'rounds_' + window._sessionId;
                var expanded = arpStorage.get(key) || [];
                var idx = round.dataset.roundIdx;
                var pos = expanded.indexOf(idx);
                if (wasExpanded) {
                    if (pos >= 0) expanded.splice(pos, 1);
                } else {
                    if (pos < 0) expanded.push(idx);
                }
                arpStorage.set(key, expanded);
            }
        }

        /* ─── Show more / less ─────────────────────────────────────── */
        function toggleShowMore(btn) {
            var body = btn.previousElementSibling;
            if (body) {
                body.classList.toggle('expanded');
                btn.textContent = body.classList.contains('expanded') ? 'Show less' : 'Show more';
            }
        }

        /* ─── Global click delegation ──────────────────────────────── */
        document.addEventListener('click', function(e) {
            var header = e.target.closest('.round-header');
            if (header) {
                var round = header.closest('.round');
                if (round) toggleRound(round);
                return;
            }
            var showMore = e.target.closest('.show-more');
            if (showMore) {
                toggleShowMore(showMore);
                return;
            }
        });

        /* ─── Keyboard shortcuts ───────────────────────────────────── */
        document.addEventListener('keydown', function(e) {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            if (e.key === 't') switchTab('token-profile');
            if (e.key === 'm') switchTab('messages');
            if (e.key === 'r') switchTab('raw');
            if (e.key === 'Escape') {
                var expanded = document.querySelectorAll('.round.expanded');
                if (expanded.length > 0) {
                    expanded.forEach(function(r) { r.classList.remove('expanded'); });
                }
                document.activeElement.blur();
            }
        });

        /* ─── Restore session tab on load ──────────────────────────── */
        if (window._sessionId) {
            var savedTab = arpStorage.get('session_tab_' + window._sessionId);
            if (savedTab) {
                setTimeout(function() { switchTab(savedTab); }, 0);
            }
            /* Restore expanded rounds */
            var savedRounds = arpStorage.get('rounds_' + window._sessionId);
            if (savedRounds && Array.isArray(savedRounds)) {
                savedRounds.forEach(function(idx) {
                    var round = document.querySelector('.round[data-round-idx="' + idx + '"]');
                    if (round) round.classList.add('expanded');
                });
            }
        }

    })();
    </script>
</body>
</html>
